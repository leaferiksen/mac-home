[options]
focus_follows_mouse = false
mouse_follows_focus = false
preset_column_widths = [0.3, 0.5, 0.7, 1]
sliver_width = 1

[swipe.gesture]
fingers_count = 4
vertical = false

[bindings]
window_focus_north = "alt - p"
window_focus_south = "alt - n"
window_focus_west = "alt - a"
window_focus_east = "alt - e"
window_swap_west = "alt - b"
window_swap_east = "alt - f"
window_stack = "alt - i"
window_unstack = "alt - o"
window_grow = "alt - r"
window_shrink = "alt - s"
window_center = "alt - c"
window_manage = "alt - m"
window_virtualnum_1 = "alt - 1"
window_virtualnum_2 = "alt - 2"
window_virtualnum_3 = "alt - 3"
window_virtualmovenum_1 = "alt + shift - 1"
window_virtualmovenum_2 = "alt + shift - 2"
window_virtualmovenum_3 = "alt + shift - 3"

[padding]
left = 10
right = 10

[windows]

[windows.all]
title = ".*"
vertical_padding = 10
horizontal_padding = 10

[window.facetime]
title = ".*"
bundle_id = "com.apple.Facetime"
floating = true

[window.emacs]
title = ".*"
bundle_id = "org.gnu.Emacs"
width = 1.0

[window.iina]
title = ".*"
bundle_id = "com.colliderli.iina"
floating = true
